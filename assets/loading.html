<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKN CAT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 50%, #1a2f4e 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
    user-select: none;
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    animation: fadeIn 0.8s ease;
  }

  .logo-icon {
    width: 100px;
    height: 100px;
    background: transparent;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .app-name {
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .app-sub {
    font-size: 1rem;
    opacity: 0.8;
    letter-spacing: 1px;
    text-align: center;
  }

  .loading-bar-wrap {
    width: 280px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 2rem;
  }

  .loading-bar {
    height: 100%;
    background: linear-gradient(90deg, #4fc3f7, #81d4fa, #4fc3f7);
    background-size: 200% 100%;
    border-radius: 2px;
    animation: loading 1.5s ease-in-out infinite;
  }

  .loading-text {
    font-size: 0.85rem;
    opacity: 0.7;
    margin-top: 1rem;
    letter-spacing: 0.5px;
  }

  .security-badge {
    position: fixed;
    bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 0.5rem 1.25rem;
    border-radius: 50px;
    font-size: 0.8rem;
    opacity: 0.8;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes loading {
    0%   { background-position: 200% 0; width: 30%; }
    50%  { background-position: 0% 0;   width: 70%; }
    100% { background-position: -200% 0; width: 30%; }
  }
</style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-icon">
      <img src="logobkn.webp" alt="BKN CAT" style="width:100%;height:100%;object-fit:contain;">
    </div>
    <div class="app-name">BKN CAT</div>
    <div class="app-sub">Computer Adaptive Test<br>SMA Unggul Binakasih Nusantara</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-text">Menghubungkan ke server ujian...</div>
  </div>

  <div class="security-badge">
    🔒 Secure Browser — Mode Ujian Aktif
  </div>
</body>
</html>
