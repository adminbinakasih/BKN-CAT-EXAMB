name: Build BKN CAT Browser

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Bisa trigger manual dari GitHub

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win nsis --x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: BKN-CAT-Windows
          path: dist/win-unpacked/
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac dmg --universal

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: BKN-CAT-Mac
          path: dist/*.dmg
          retention-days: 30
